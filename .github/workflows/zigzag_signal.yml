name: ZigZag BTC Signal

on:
  schedule:
    # Minden 30 percben fut (UTC)
    - cron: '0,00 * * * *'
  workflow_dispatch:  # Kezi inditas is lehetseges

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python beallitas
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fuggosegek telepitese
        run: pip install requests

      - name: ZigZag scanner futtatasa
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python zigzag_signal.py
